<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cube Physics Simulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin: 0; background: #111; }
#canvas { width: 100vw; height: 100vh; }
.controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 8px;
}
button { margin: 5px; padding: 10px; }
</style>
</head>

<body>

<div id="canvas"></div>

<div class="controls">
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
</div>

<script>
let scene, camera, renderer;
let cube, box;
let isRunning = false, isPaused = false;

const G = 9.81;
const DT = 0.016;
const SIZE = 10;

let position = new THREE.Vector3(0, 3, 0);
let velocity = new THREE.Vector3(2, 0, 1);
let acceleration = new THREE.Vector3();

function init() {
    const canvasContainer = document.getElementById("canvas");

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(
        75,
        canvasContainer.clientWidth / canvasContainer.clientHeight,
        0.1,
        1000
    );
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
    canvasContainer.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const geo = new THREE.BoxGeometry(SIZE, SIZE, SIZE);
    const mat = new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true });
    box = new THREE.Mesh(geo, mat);
    scene.add(box);

    const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
    const cubeMat = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
    cube = new THREE.Mesh(cubeGeo, cubeMat);
    scene.add(cube);

    window.addEventListener("resize", onResize);
}

function onResize() {
    const canvasContainer = document.getElementById("canvas");
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
}

function step() {
    acceleration.set(0, -G, 0);

    velocity.addScaledVector(acceleration, DT);
    position.addScaledVector(velocity, DT);

    const half = SIZE / 2 - 0.5;

    ["x","y","z"].forEach(axis => {
        if (position[axis] > half) {
            position[axis] = half;
            velocity[axis] *= -0.75;
        }
        if (position[axis] < -half) {
            position[axis] = -half;
            velocity[axis] *= -0.75;
        }
    });
}

function animate() {
    requestAnimationFrame(animate);

    if (isRunning && !isPaused) {
        step();
    }

    cube.position.copy(position);
    renderer.render(scene, camera);
}

document.getElementById("startBtn").onclick = () => {
    isRunning = true;
};

document.getElementById("pauseBtn").onclick = () => {
    isPaused = !isPaused;
};

document.getElementById("resetBtn").onclick = () => {
    position.set(0, 3, 0);
    velocity.set(2, 0, 1);
};

init();
animate();
</script>

</body>
</html>
